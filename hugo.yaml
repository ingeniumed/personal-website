baseURL: https://majestic-cannoli-71e5f4.netlify.app
languageCode: en-us
title: Gopal Krishnan
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts"]

minify:
  disableXML: true
  minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 5

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Posts
          url: posts
          weight: 5
        - name: Search
          url: search/
          weight: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Just a bunch of thoughts by a dad, with a hint of coffee and gaming thrown in."
  author: Gopal Krishnan

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  comments: false

  homeInfoParams:
    Title: "Hi, I'm Gopal 👋"
    Content: >
      This is a space where I share my thoughts, experiences, and learnings. 
      I work at Automattic as a Senior Software Developer. I am a 🇨🇦 living in 🇦🇺 with my wife and son.
      <br><br>
      Check out my [resume](/files/resume.pdf).

  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/ingeniumed"
    - name: LinkedIn
      title: Connect with me on LinkedIn
      url: "https://www.linkedin.com/in/ingeniumed/"

  assets:
    disableFingerprinting: true
    disableHLJS: true

  label:
    text: "Home"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

privacy:
  youtube:
    disabled: false
    privacyEnhanced: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true